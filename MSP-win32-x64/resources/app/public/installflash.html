<style type="text/css">
  /*this is what we want the div to look like
    when it is not showing*/
  div.loading-invisible{
    /*make invisible*/
    visibility:hidden;
  }

  .spinner_img
  {
  }
  
  #spinnerdiv
  {
	position:absolute;
	top:47px;
	left:10px;	
	display:none;
  }
</style>

	Click the "Get Flashplayer" button below to install flashplayer 9.159.
	<br/>
	<br/>
	
	<script language="JavaScript" type="text/javascript">

	var isIE  = (navigator.appVersion.indexOf("MSIE") != -1) ? true : false;
	var isWin = (navigator.appVersion.toLowerCase().indexOf("win") != -1) ? true : false;
	var isOpera = (navigator.userAgent.indexOf("Opera") != -1) ? true : false;
	
	function installButtonClicked(installerFile)
	{
		var btn = document.getElementById('installButton');
		btn.style.visibility = 'hidden';
		document.getElementById("nav").className = "loading-invisible";
		var sp = document.getElementById("spinnerdiv");
		sp.style.display = 'block';
		this.location.href='http://www.moviestarplanet.com/'+installerFile;
		document.getElementById("spinnerid").src = "ajax-loader.gif";
	}
	
	var installerFile = (isIE == true) ? "MSP_activex_installer.exe" : "MSP_plugin_installer.exe";
	var alternateContent = '<form><input id="installButton" type=button value="Get Flashplayer..." onClick="installButtonClicked(\''+installerFile+'\');return false;"/></form><div id="spinnerdiv"><img id="spinnerid" class="spinner_img" src="ajax-loader.gif"/> Loading Flash Player installer. Please wait...</div>';
    document.write(alternateContent);
	</script>
	Click on the "Run" buttons when you see these windows:
	<br/><br/>
	<img src="Install1.jpg"><br/><br/>
	<img src="Install2.jpg">';
